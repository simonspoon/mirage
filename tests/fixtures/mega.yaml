swagger: "2.0"
info:
  title: Mega
  version: "1.0.0"
basePath: /
paths:
  /primitives:
    get:
      operationId: listPrimitives
      summary: List primitives
      responses:
        "200":
          description: successful operation
          schema:
            type: array
            items:
              $ref: "#/definitions/Primitives"
  /composed/{id}:
    get:
      operationId: getComposed
      summary: Get composed entity by id
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      responses:
        "200":
          description: successful operation
          schema:
            $ref: "#/definitions/ComposedEntity"
  /owners:
    get:
      operationId: listOwners
      summary: List owners
      responses:
        "200":
          description: successful operation
          schema:
            type: array
            items:
              $ref: "#/definitions/Owner"
  /widgets:
    get:
      operationId: listWidgets
      summary: List widgets
      parameters:
        - name: filter
          in: query
          required: false
          type: string
      responses:
        "200":
          description: successful operation
          schema:
            type: array
            items:
              $ref: "#/definitions/Widget"
    post:
      operationId: createWidget
      summary: Create widget
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: "#/definitions/Widget"
      responses:
        "201":
          description: widget created
          schema:
            $ref: "#/definitions/Widget"
  /widgets/{id}:
    get:
      operationId: getWidget
      summary: Get widget by id
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      responses:
        "200":
          description: successful operation
          schema:
            $ref: "#/definitions/Widget"
    put:
      operationId: updateWidget
      summary: Update widget
      parameters:
        - name: id
          in: path
          required: true
          type: integer
        - name: body
          in: body
          required: true
          schema:
            $ref: "#/definitions/Widget"
      responses:
        "200":
          description: widget updated
          schema:
            $ref: "#/definitions/Widget"
    delete:
      operationId: deleteWidget
      summary: Delete widget
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      responses:
        # 200 declared (spec-cosmetic) with $ref Widget so the server's table
        # resolver (primary_response_def prefers 200 then 201) picks "Widget"
        # instead of falling back to the pluralized path segment "Widgets",
        # which would not match the definition-backed SQLite table. Runtime
        # still returns 204 (handler hardcoded in src/server.rs:376).
        "200":
          description: widget deleted
          schema:
            $ref: "#/definitions/Widget"
        "204":
          description: widget deleted
definitions:
  BaseAudit:
    type: object
    properties:
      created_at:
        type: string
        format: date-time
      updated_by:
        type: string
  Address:
    type: object
    properties:
      city:
        type: string
      country:
        type: string
  Owner:
    type: object
    properties:
      name:
        type: string
      address:
        $ref: "#/definitions/Address"
  ComposedEntity:
    allOf:
      - $ref: "#/definitions/BaseAudit"
      - type: object
        properties:
          id:
            type: integer
          title:
            type: string
          priority:
            type: integer
          owner:
            $ref: "#/definitions/Owner"
  Primitives:
    type: object
    properties:
      str_plain:
        type: string
      int32_field:
        type: integer
        format: int32
      int64_field:
        type: integer
        format: int64
      float_field:
        type: number
        format: float
      double_field:
        type: number
        format: double
      bool_field:
        type: boolean
      date_field:
        type: string
        format: date
      datetime_field:
        type: string
        format: date-time
      uuid_field:
        type: string
        format: uuid
      email_field:
        type: string
        format: email
      enum_field:
        type: string
        enum:
          - alpha
          - beta
          - gamma
      const_field:
        type: string
  Widget:
    type: object
    properties:
      id:
        type: integer
      name:
        type: string
      price:
        type: number
      status:
        type: string
