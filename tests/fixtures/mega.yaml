swagger: "2.0"
info:
  title: Mega
  version: "1.0.0"
basePath: /
paths:
  /primitives:
    get:
      operationId: listPrimitives
      summary: List primitives
      responses:
        "200":
          description: successful operation
          schema:
            type: array
            items:
              $ref: "#/definitions/Primitives"
  /composed/{id}:
    get:
      operationId: getComposed
      summary: Get composed entity by id
      parameters:
        - name: id
          in: path
          required: true
          type: integer
      responses:
        "200":
          description: successful operation
          schema:
            $ref: "#/definitions/ComposedEntity"
  /owners:
    get:
      operationId: listOwners
      summary: List owners
      responses:
        "200":
          description: successful operation
          schema:
            type: array
            items:
              $ref: "#/definitions/Owner"
definitions:
  BaseAudit:
    type: object
    properties:
      created_at:
        type: string
        format: date-time
      updated_by:
        type: string
  Address:
    type: object
    properties:
      city:
        type: string
      country:
        type: string
  Owner:
    type: object
    properties:
      name:
        type: string
      address:
        $ref: "#/definitions/Address"
  ComposedEntity:
    allOf:
      - $ref: "#/definitions/BaseAudit"
      - type: object
        properties:
          id:
            type: integer
          title:
            type: string
          priority:
            type: integer
          owner:
            $ref: "#/definitions/Owner"
  Primitives:
    type: object
    properties:
      str_plain:
        type: string
      int32_field:
        type: integer
        format: int32
      int64_field:
        type: integer
        format: int64
      float_field:
        type: number
        format: float
      double_field:
        type: number
        format: double
      bool_field:
        type: boolean
      date_field:
        type: string
        format: date
      datetime_field:
        type: string
        format: date-time
      uuid_field:
        type: string
        format: uuid
      email_field:
        type: string
        format: email
      enum_field:
        type: string
        enum:
          - alpha
          - beta
          - gamma
      const_field:
        type: string
