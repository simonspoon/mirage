swagger: "2.0"
info:
  title: InputOnlyTest
  version: "1.0.0"
paths:
  /pets:
    get:
      operationId: listPets
      responses:
        "200":
          description: list of pets
          schema:
            type: array
            items:
              $ref: "#/definitions/Pet"
    post:
      operationId: createPet
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: "#/definitions/CreatePetRequest"
      responses:
        "201":
          description: created
          schema:
            $ref: "#/definitions/Pet"
  /pets/{petId}:
    get:
      operationId: getPet
      parameters:
        - name: petId
          in: path
          required: true
          type: integer
      responses:
        "200":
          description: a pet
          schema:
            $ref: "#/definitions/Pet"
definitions:
  Pet:
    type: object
    properties:
      id:
        type: integer
      name:
        type: string
      status:
        type: string
  CreatePetRequest:
    type: object
    properties:
      name:
        type: string
      tag:
        type: string
