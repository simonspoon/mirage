swagger: "2.0"
info:
  title: Petstore
  version: "1.0.0"
basePath: /v2
paths:
  /pet/{petId}:
    get:
      operationId: getPetById
      summary: Find pet by ID
      description: Returns a single pet
      parameters:
        - name: petId
          in: path
          required: true
          type: integer
          format: int64
      responses:
        "200":
          description: successful operation
          schema:
            $ref: "#/definitions/Pet"
        "404":
          description: Pet not found
    delete:
      operationId: deletePet
      summary: Deletes a pet
      parameters:
        - name: petId
          in: path
          required: true
          type: integer
          format: int64
      responses:
        "200":
          description: successful operation
        "404":
          description: Pet not found
  /pet:
    post:
      operationId: addPet
      summary: Add a new pet to the store
      parameters:
        - in: body
          name: body
          required: true
          schema:
            $ref: "#/definitions/Pet"
      responses:
        "200":
          description: successful operation
          schema:
            $ref: "#/definitions/Pet"
definitions:
  Category:
    type: object
    properties:
      id:
        type: integer
        format: int64
      name:
        type: string
  Tag:
    type: object
    properties:
      id:
        type: integer
        format: int64
      name:
        type: string
  Pet:
    type: object
    required:
      - name
    properties:
      id:
        type: integer
        format: int64
      category:
        $ref: "#/definitions/Category"
      name:
        type: string
        description: The name of the pet
      tags:
        type: array
        items:
          $ref: "#/definitions/Tag"
      status:
        type: string
        description: pet status in the store
        enum:
          - available
          - pending
          - sold
      breed:
        type: string
        description: pet breed (used by recipes learn for custom_list detection)
      tagId:
        type: string
        description: external UUID identifier (used for uuid-format detection)
      email:
        type: string
        description: contact email (used for email-format detection)
      kind:
        type: string
        description: constant tag (used for Const-rule detection)
